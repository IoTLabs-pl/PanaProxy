esp32:
  variant: esp32c3
  framework:
    type: esp-idf

light:
  - platform: esp32_rmt_led_strip
    id: builtin_led
    rgb_order: GRB
    pin: GPIO10
    num_leds: 1
    chipset: ws2812

uart:
  - id: heatpump_uart
    tx_pin: GPIO3
    rx_pin:
      number: GPIO2
      ignore_strapping_warning: true
    baud_rate: 9600
    data_bits: 8
    parity: EVEN
    stop_bits: 1
  - id: remote_uart
    tx_pin: GPIO4
    rx_pin: GPIO5
    baud_rate: 9600
    data_bits: 8
    parity: EVEN
    stop_bits: 1

